name: CI

# Builds and tests on every push/PR. Produces an UNSIGNED release APK artifact.
# Signing happens locally on the developer machine only (see PLAN.md §13) —
# the keystore never enters CI or repo secrets.
on:
  push:
    branches: [master]
    tags: ['v*']
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: gradle/actions/setup-gradle@v4

      - name: Unit tests
        run: ./gradlew testDebugUnitTest --console=plain

      - name: Build unsigned release APK
        run: ./gradlew assembleRelease --console=plain

      - name: Upload unsigned APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-unsigned
          path: app/build/outputs/apk/release/*.apk
